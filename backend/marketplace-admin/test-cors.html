<!DOCTYPE html>
<html>
<head><title>CORS Test</title></head>
<body>
<h2>CORS Test</h2>
<pre id="out"></pre>
<script>
const out = document.getElementById('out');
function log(msg) { out.textContent += msg + '\n'; }

fetch('http://http://epinhesabim.com/api/v2/auth/login', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ identifier: 'admin', password: 'admin123' }),
  credentials: 'include'
})
.then(async res => {
  log('Status: ' + res.status);
  log('Content-Type: ' + res.headers.get('content-type'));
  const ct = res.headers.get('content-type') || '';
  if (ct.includes('json')) {
    const data = await res.json();
    log('JSON: ' + JSON.stringify(data, null, 2).substring(0, 500));
  } else {
    const text = await res.text();
    log('HTML: ' + text.substring(0, 300));
  }
})
.catch(err => {
  log('ERROR: ' + err.message);
});
</script>
</body>
</html>
