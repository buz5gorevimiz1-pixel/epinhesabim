<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategoriler - ItemSatış Premium</title>
    <link rel="stylesheet" href="assets/listings.css">
    <link rel="stylesheet" href="assets/css/admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-base: #050507;
            --bg-surface: rgba(20, 20, 25, 0.4);
            --bg-surface-hover: rgba(30, 30, 40, 0.6);
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-light: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(139, 92, 246, 0.5);
            --glow-primary: 0 0 20px rgba(139, 92, 246, 0.3);
            --glow-secondary: 0 0 20px rgba(236, 72, 153, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.05), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Özel Kaydırma Çubuğu */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 92, 246, 0.6);
        }

        /* Navbar */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 5, 7, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .logo i {
            font-size: 26px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            flex: 1;
            justify-content: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s, text-shadow 0.3s;
            position: relative;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }

        .profile-btn {
            padding: 10px 20px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(236, 72, 153, 0.1));
            border: 1px solid var(--border-focus);
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-btn:hover {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
            transform: translateY(-2px);
            box-shadow: var(--glow-primary);
        }

        /* Hero Section */
        .hero-section {
            position: relative;
            padding: 80px 24px;
            text-align: center;
            overflow: hidden;
            border-bottom: 1px solid var(--border-light);
        }

        .hero-bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            max-width: 800px;
            max-height: 800px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, rgba(236, 72, 153, 0.05) 40%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero-section h1 {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 20%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-section p {
            font-size: 18px;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 32px;
            font-weight: 400;
        }

        /* Search Bar */
        .search-wrapper {
            position: relative;
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            padding: 8px;
            background: rgba(20, 20, 25, 0.6);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .search-wrapper:focus-within {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .search-icon {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 20px;
        }

        .search-input {
            flex: 1;
            padding: 16px 16px 16px 54px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 500;
        }

        .search-input:focus {
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(156, 163, 175, 0.6);
        }

        .search-btn {
            padding: 0 32px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .search-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .search-btn:hover {
            transform: scale(1.02);
            box-shadow: var(--glow-secondary);
        }

        .search-btn:hover::before {
            left: 100%;
        }

        /* Container & Layout */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* Filters */
        .filters-section {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            align-items: center;
            overflow-x: auto;
            padding-bottom: 8px; /* For scrollbar breathing room */
        }

        .filters-section::-webkit-scrollbar {
            height: 4px;
        }

        .filter-btn {
            padding: 12px 24px;
            border: 1px solid var(--border-light);
            border-radius: 30px;
            background: var(--bg-surface);
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .filter-btn:hover {
            border-color: rgba(139, 92, 246, 0.4);
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.15));
            border-color: var(--border-focus);
            color: var(--text-main);
            box-shadow: var(--glow-primary);
        }

        /* Categories Grid */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Animations */
        @keyframes fadeUpIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .category-item {
            position: relative;
            height: 220px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            background: var(--bg-surface);
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-decoration: none;
            opacity: 0; /* Animasyon için başlangıç */
            animation: fadeUpIn 0.5s ease forwards;
        }

        .category-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
        }

        /* Hover Border Glow Effect */
        .category-item::after {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .category-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), var(--glow-primary);
            border-color: transparent; /* Kendi border'ını sakla, arkaplan parlasın */
        }

        .category-item:hover::after {
            opacity: 1;
        }

        .category-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.1;
            z-index: 0;
            transition: transform 0.7s ease, opacity 0.4s ease;
        }

        .category-item:hover img {
            opacity: 0.25;
            transform: scale(1.1);
        }

        .category-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .category-icon {
            width: 64px;
            height: 64px;
            background: rgba(15, 15, 20, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--text-main);
            box-shadow: inset 0 0 20px rgba(139, 92, 246, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-item:hover .category-icon {
            transform: scale(1.1) rotate(5deg);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .category-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.3px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: color 0.3s;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 80px 24px;
            background: var(--bg-surface);
            border-radius: 24px;
            border: 1px dashed var(--border-light);
            grid-column: 1 / -1;
            backdrop-filter: blur(10px);
        }

        .no-results i {
            font-size: 56px;
            color: var(--text-muted);
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--text-muted), #4b5563);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .no-results h3 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .no-results p {
            color: var(--text-muted);
        }

        /* Toasts */
        .toast-container {
            position: fixed;
            right: 24px;
            bottom: 24px;
            display: grid;
            gap: 12px;
            z-index: 9999;
            pointer-events: none;
        }

        .toast {
            min-width: 280px;
            padding: 16px 20px;
            border-radius: 16px;
            background: rgba(15, 15, 20, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
            border: 1px solid var(--border-focus);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), var(--glow-primary);
            opacity: 0;
            transform: translateX(50px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast::before {
            content: '\f05a'; /* FontAwesome info icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: var(--primary);
            font-size: 18px;
        }

        .toast.toast-success::before {
            content: '\f058'; /* FontAwesome check-circle icon */
            color: #10b981;
        }

        .toast.visible {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .hero-section h1 { font-size: 48px; }
            .categories-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; } /* Mobilde menüyü gizle veya hamburger menü eklenebilir */
            .hero-section { padding: 60px 16px; }
            .hero-section h1 { font-size: 36px; }
            .hero-section p { font-size: 15px; }
            
            .search-wrapper {
                flex-direction: column;
                background: transparent;
                border: none;
                box-shadow: none;
                gap: 8px;
                padding: 0;
            }

            .search-input {
                width: 100%;
                background: rgba(20, 20, 25, 0.8);
                border: 1px solid var(--border-light);
                border-radius: 16px;
                padding: 16px 16px 16px 50px;
            }

            .search-icon {
                top: 26px; /* Buton yüksekliğine göre ayarlandı */
            }

            .search-btn {
                width: 100%;
                padding: 16px;
                border-radius: 16px;
            }

            .categories-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            
            .category-item {
                height: 180px;
                padding: 16px;
                border-radius: 16px;
            }
            .category-icon {
                width: 48px;
                height: 48px;
                font-size: 20px;
                border-radius: 14px;
            }
            .category-name { font-size: 14px; }
        }

        @media (max-width: 480px) {
            .categories-grid { grid-template-columns: 1fr; gap: 16px; }
            .category-item { height: 140px; flex-direction: row; justify-content: flex-start; text-align: left; padding: 20px; }
            .category-content { flex-direction: row; gap: 20px; width: 100%; }
            .category-icon { margin: 0; }
        }
    </style>
</head>

            { name: 'Critical Strike', icon: 'fas fa-strike', filter: 'games', url: '/server-kategorisi/critical-strike' },
            { name: 'CrossFire', icon: 'fas fa-fire', filter: 'games', url: '/server-kategorisi/crossfire' },
            { name: 'Crunchyroll', icon: 'fas fa-play', filter: 'accounts', url: '/server-kategorisi/crunchyroll' },
            { name: 'Crunchyroll Hesap', icon: 'fas fa-user-circle', filter: 'accounts', url: '/server-kategorisi/crunchyroll-hesap' },
            { name: 'Crystal of Atlan', icon: 'fas fa-gem', filter: 'games', url: '/server-kategorisi/crystal-of-atlan' },
            { name: 'CS2 Boost', icon: 'fas fa-up-long', filter: 'services', url: '/server-kategorisi/cs-2-boost' },
            { name: 'CS2 Hesap Satışı', icon: 'fas fa-tag', filter: 'accounts', url: '/server-kategorisi/cs2-ilan-pazari' },
            { name: 'CS2 Topluluk Sunucuları', icon: 'fas fa-server', filter: 'services', url: '/server-kategorisi/cs2-topluluk-sunuculari' },
            { name: 'Cubic Castles', icon: 'fas fa-cube', filter: 'games', url: '/server-kategorisi/cubic-castles' },
            { name: 'Discord', icon: 'fas fa-comments', filter: 'social', url: '/server-kategorisi/discord' },
            { name: 'eFootball Mobile', icon: 'fas fa-futbol', filter: 'games', url: '/server-kategorisi/efootball-mobile' },
            { name: 'Fortnite', icon: 'fas fa-fort', filter: 'games', url: '/server-kategorisi/fortnite' },
            { name: 'Google Play', icon: 'fas fa-play', filter: 'accounts', url: '/server-kategorisi/google-play' },
            { name: 'Instagram', icon: 'fas fa-camera', filter: 'social', url: '/server-kategorisi/instagram' },
            { name: 'League of Legends', icon: 'fas fa-crown', filter: 'games', url: '/server-kategorisi/league-of-legends' },
            { name: 'Mobile Legends', icon: 'fas fa-mobile', filter: 'games', url: '/server-kategorisi/mobile-legends' },
            { name: 'PUBG Mobile', icon: 'fas fa-map', filter: 'games', url: '/server-kategorisi/ergenekon' },
            { name: 'Sosyal Medya', icon: 'fas fa-share-nodes', filter: 'social', url: '/server-kategorisi/orhun' },
            { name: 'Steam', icon: 'fas fa-gamepad', filter: 'accounts', url: '/server-kategorisi/steam' },
            { name: 'TikTok', icon: 'fas fa-video', filter: 'social', url: '/server-kategorisi/tiktok' },
            { name: 'Twitter', icon: 'fas fa-x-twitter', filter: 'social', url: '/server-kategorisi/twitter' },
            { name: 'Valorant', icon: 'fas fa-shield', filter: 'games', url: '/server-kategorisi/valorant' },
            { name: 'YouTube', icon: 'fas fa-youtube', filter: 'social', url: '/server-kategorisi/youtube' }
        ];

        const grid = document.getElementById('categoriesGrid');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const noResults = document.getElementById('noResults');
        let currentFilter = 'all';

        function renderCategories(filter = 'all', search = '') {
            grid.innerHTML = '';
            const lowerSearch = search.toLowerCase();

            let filtered = categories.filter(cat => {
                const matchFilter = filter === 'all' || cat.filter === filter;
                const matchSearch = search === '' || cat.name.toLowerCase().includes(lowerSearch);
                return matchFilter && matchSearch;
            });

            if (filtered.length === 0) {
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';

            filtered.forEach((category, index) => {
                const item = document.createElement('a');
                item.href = category.url;
                item.className = 'category-item';
                // Animasyonların kartlara sırayla (staggered) uygulanması için delay ekliyoruz
                item.style.animationDelay = `${index * 0.03}s`;
                
                item.innerHTML = `
                    <div class="category-content">
                        <div class="category-icon">
                            <i class="${category.icon}"></i>
                        </div>
                        <div class="category-name">${category.name}</div>
                    </div>
                    <img src="https://images.unsplash.com/photo-1614680376593-902f74cf0d41?q=80&w=600&auto=format&fit=crop" alt="${category.name}" loading="lazy">
                `;
                
                item.addEventListener('click', (e) => {
                    // Sayfa yönlendirmesi simülasyonu / gerçekte preventDefault silinmeli
                    // e.preventDefault(); 
                    showToast(`${category.name} kategorisine yönlendiriliyorsunuz...`, 'info');
                });

                grid.appendChild(item);
            });
        }

        // Filter buttons
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderCategories(currentFilter, searchInput.value);
            });
        });

        // Search functionality
        searchBtn.addEventListener('click', () => {
            renderCategories(currentFilter, searchInput.value);
        });

        searchInput.addEventListener('input', (e) => {
            // Anlık arama deneyimi için input event eklendi
            renderCategories(currentFilter, e.target.value);
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                renderCategories(currentFilter, searchInput.value);
            }
        });

        // Toast notifications
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.add('visible');
            });

            setTimeout(() => {
                toast.classList.remove('visible');
                toast.addEventListener('transitionend', () => toast.remove(), { once: true });
            }, 3000);
        }

        // Initial render
        const urlParams = new URLSearchParams(window.location.search);
        const categoryParam = urlParams.get('category');
        
        if (categoryParam) {
            const matchingCategory = categories.find(cat => cat.name === categoryParam);
            if (matchingCategory) {
                filterBtns.forEach(b => b.classList.remove('active'));
                const filterBtn = document.querySelector(`[data-filter="${matchingCategory.filter}"]`);
                if (filterBtn) filterBtn.classList.add('active');
                currentFilter = matchingCategory.filter;
                renderCategories(currentFilter, '');
                
                window.scrollTo(0, 0);
                showToast(`${categoryParam} kategorisi filtrelendi!`, 'success');
            } else {
                renderCategories();
            }
        } else {
            renderCategories();
        }
    </script>
</body>
</html>
