<!doctype html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Epin Hesabım - Üyelik</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>

    :root{
      --bg:#0b0c12;
      --surface:#141624;
      --border-color:#222436;
      --text-color:#e5e7eb;
      --text-muted:#9ca3af;
      --blue:#2563eb;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text-color);
      font-family:Arial,sans-serif;
      overflow-x:hidden;
    }

    .page{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
      position:relative;
    }

    .page::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(to bottom,#101223,#05060d);
      z-index:0;
    }

    .card{
      width:100%;
      max-width:500px;
      background:#1a1c2b;
      border:1px solid var(--border-color);
      border-radius:16px;
      padding:24px;
      position:relative;
      z-index:1;
      box-shadow:0 20px 40px rgba(0,0,0,.4);
    }

    .logo{
      text-align:center;
      font-size:32px;
      font-weight:800;
      margin-bottom:20px;
    }

    .title{
      font-size:28px;
      font-weight:700;
      margin-bottom:25px;
    }

    .register-form{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .input-wrap{
      position:relative;
      display:flex;
      align-items:center;
      height:58px;
      background:#0f1118;
      border:1px solid var(--border-color);
      border-radius:12px;
      padding:0 16px;
    }

    .input-wrap i{
      color:#9ca3af;
      margin-right:10px;
    }

    .input-wrap input{
      flex:1;
      background:none;
      border:none;
      outline:none;
      color:#fff;
      font-size:15px;
    }

    .icon-action{
      background:none;
      border:none;
      color:#9ca3af;
      cursor:pointer;
      font-size:16px;
    }

    .agreements{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:6px;
      font-size:14px;
    }

    .agreements label{
      display:flex;
      align-items:flex-start;
      gap:10px;
      line-height:1.5;
    }

    .agreements a{
      color:#ef4444;
      text-decoration:none;
      font-weight:600;
    }

    .btn{
      width:100%;
      height:58px;
      border:none;
      border-radius:12px;
      background:var(--blue);
      color:#fff;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:.2s;
    }

    .btn:hover{
      opacity:.9;
    }

    .cta{
      width:100%;
      height:56px;
      border:none;
      border-radius:12px;
      background:#10b981;
      color:#fff;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }

    .cta:hover{
      opacity:.9;
    }

  </style>
</head>

<body>

<div class="page">

  <div class="card">

    <div class="logo">
      Epin Hesabım
    </div>

    <div class="title">
      Üyelik Oluştur
    </div>

    <form class="register-form" id="registerForm" novalidate>

      <div class="input-wrap">
        <i class="fas fa-id-card"></i>

        <input
          id="full_name"
          name="full_name"
          type="text"
          placeholder="Adınız / Soyadınız"
          required
        >
      </div>

      <div class="input-wrap">
        <i class="fas fa-envelope"></i>

        <input
          id="email"
          name="email"
          type="email"
          placeholder="E-posta"
          required
        >
      </div>

      <div class="input-wrap">
        <i class="fas fa-phone"></i>

        <input
          id="phone"
          name="phone"
          type="tel"
          placeholder="Telefon"
          required
        >
      </div>

      <div class="input-wrap">
        <i class="fas fa-user"></i>

        <input
          id="username"
          name="username"
          type="text"
          placeholder="Kullanıcı Adı"
          required
          maxlength="32"
          pattern="^[A-Za-z0-9_.\\-]{3,32}$"
        >
      </div>

      <div class="input-wrap">

        <i class="fas fa-key"></i>

        <input
          id="password"
          name="password"
          type="password"
          placeholder="Şifre"
          required
        >

        <button
          type="button"
          class="icon-action"
          onclick="togglePassword()"
        >
          <i class="fas fa-eye-slash"></i>
        </button>

      </div>

      <div class="agreements">

        <label>
          <input type="checkbox" name="terms" required>

          <span>
            <a href="#">
              Üyelik Sözleşmesini
            </a>

            okudum & kabul ediyorum.
          </span>
        </label>

        <label>
          <input type="checkbox" name="kvkk" required>

          <span>
            <a href="#">
              Kişisel Verilerin Korunma Politikası
            </a>

            nı okudum & kabul ediyorum.
          </span>
        </label>

      </div>

      <button type="submit" class="btn">
        Üyeliği Oluştur
      </button>

      <button
        type="button"
        class="cta"
        onclick="window.location.href='login.html'"
      >
        GİRİŞ YAP
      </button>

    </form>

  </div>

</div>

<script>

function togglePassword(){

  const input=document.getElementById("password");

  const icon=document.querySelector(".icon-action i");

  if(input.type==="password"){

    input.type="text";

    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");

  }else{

    input.type="password";

    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  }
}

const phone=document.getElementById("phone");

phone.addEventListener("input",function(){

  this.value=this.value.replace(/[^0-9]/g,'').slice(0,10);
});

const registerForm=document.getElementById("registerForm");

registerForm.addEventListener("submit",async function(e){

  e.preventDefault();

  const full_name=document.getElementById("full_name").value.trim();
  const email=document.getElementById("email").value.trim();
  const phone=document.getElementById("phone").value.trim();
  const username=document.getElementById("username").value.trim();
  const password=document.getElementById("password").value.trim();

  const terms=document.querySelector('input[name="terms"]').checked;
  const kvkk=document.querySelector('input[name="kvkk"]').checked;

  // EKSİK ALAN

  if(
    !full_name ||
    !email ||
    !phone ||
    !username ||
    !password
  ){

    Swal.fire({
      icon:"warning",
      title:"Eksik Bilgi",
      text:"Lütfen tüm alanları doldurun.",
      confirmButtonColor:"#f59e0b",
      background:"#1a1c2b",
      color:"#ffffff"
    });

    return;
  }

  // CHECKBOX

  if(!terms || !kvkk){

    Swal.fire({
      icon:"warning",
      title:"Onay Gerekli",
      text:"Sözleşmeleri kabul etmelisiniz.",
      confirmButtonColor:"#f59e0b",
      background:"#1a1c2b",
      color:"#ffffff"
    });

    return;
  }

  try{

    const response=await fetch("/api/auth/register",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        full_name,
        email,
        phone,
        username,
        password
      })
    });

    const result=await response.json();

    if(response.ok){

      if(result.token){

        localStorage.setItem("token",result.token);
      }

      Swal.fire({
        icon:"success",
        title:"Başarılı",
        text:"Hesabınız başarıyla oluşturuldu",
        confirmButtonColor:"#2563eb",
        background:"#1a1c2b",
        color:"#ffffff"
      }).then(()=>{

        window.location.href="index.html";

      });

    }else{

      Swal.fire({
        icon:"error",
        title:"Hata",
        text:result.message || "Kayıt başarısız",
        confirmButtonColor:"#ef4444",
        background:"#1a1c2b",
        color:"#ffffff"
      });
    }

  }catch(err){

    console.log(err);

    Swal.fire({
      icon:"error",
      title:"Sunucu Hatası",
      text:"Backend bağlantısı başarısız",
      confirmButtonColor:"#ef4444",
      background:"#1a1c2b",
      color:"#ffffff"
    });
  }
});

</script>

</body>
</html
