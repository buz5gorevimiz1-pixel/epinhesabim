<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan Pazarı - Tüm Aktif İlanlar | Epin Hesabım</title>
    <meta name="description" content="İlan Pazarı: Epin Hesabım'a yüklenmiş tüm aktif ilanlar tek listede. Oyun hesapları, epin ve dijital ürünleri uygun fiyat ve güvenli ödeme ile keşfedin.">
    <meta name="keywords" content="ilan pazarı, oyun hesabı, epin, dijital ürün, hesap satış, epin hesabım">
    <link rel="canonical" href="/ilan-pazari">
    <meta property="og:type" content="website">
    <meta property="og:title" content="İlan Pazarı - Tüm Aktif İlanlar | Epin Hesabım">
    <meta property="og:description" content="Epin Hesabım'a yüklenmiş tüm aktif ilanlar tek listede, canlı olarak.">
    <meta property="og:url" content="/ilan-pazari">
    <link rel="icon" type="image/x-icon" href="assets/settings/favicon_1772100659.png">
    <link rel="shortcut icon" type="image/x-icon" href="assets/settings/favicon_1772100659.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
      body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text-color);margin:0;}
      .ip-wrap{max-width:1320px;margin:0 auto;padding:0 16px;}

      /* Header */
      .ip-header{
        position:sticky;top:0;z-index:50;
        background:var(--surface);
        border-bottom:1px solid var(--border-color);
        box-shadow:0 2px 14px rgba(0,0,0,.25);
      }
      .ip-header-inner{
        max-width:1320px;margin:0 auto;padding:12px 16px;
        display:flex;align-items:center;gap:16px;flex-wrap:wrap;
      }
      .ip-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;flex:0 0 auto}
      .ip-logo img{height:38px;max-width:180px;object-fit:contain}
      .ip-search{flex:1 1 280px;min-width:0;display:flex;align-items:center;gap:8px;
        background:var(--bg);border:1px solid var(--border-color);border-radius:12px;padding:8px 12px}
      .ip-search i{opacity:.6}
      .ip-search input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--text-color);font-size:14px}
      .ip-home-btn{flex:0 0 auto;display:inline-flex;align-items:center;gap:8px;
        background:var(--primary);color:#fff;border:none;border-radius:12px;
        padding:9px 16px;font-weight:700;font-size:13px;text-decoration:none;cursor:pointer;white-space:nowrap}
      .ip-home-btn:hover{filter:brightness(1.08)}

      /* Title block */
      .ip-title-block{padding:26px 0 10px}
      .ip-title-block h1{margin:0;font-size:26px;font-weight:800;display:flex;align-items:center;gap:10px}
      .ip-title-block h1 i{color:var(--primary-solid)}
      .ip-title-block p{margin:6px 0 0;opacity:.7;font-size:14px}
      .ip-count{display:inline-block;margin-left:8px;font-size:13px;font-weight:700;opacity:.8}

      /* ── Kart tasarımı: anasayfadaki ilan kartları ile birebir aynı (.ipcard) ── */
      .ipgrid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:16px;align-items:stretch;padding:14px 0 50px}
      /* Masaüstü: 6 / Tablet: 3-4 / Mobil: 2 */
      @media(max-width:1200px){.ipgrid{grid-template-columns:repeat(4,minmax(0,1fr))}}
      @media(max-width:900px){.ipgrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
      @media(max-width:640px){.ipgrid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}}

      .ipcard{
        display:flex;flex-direction:column;
        border:1px solid rgba(255,255,255,.10);
        background: rgba(18,20,32,.62);
        border-radius:16px;overflow:hidden;min-width:0;
        text-decoration:none;color:inherit;height:100%;
        transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      }
      [data-theme="light"] .ipcard{background:var(--surface);border-color:var(--border-color)}

      .ipthumb{position:relative;width:100%;aspect-ratio:5/4;overflow:hidden;flex:0 0 auto}
      .ipthumb img{width:100%;height:100%;object-fit:cover;display:block}

      .ipprice{
        position:absolute;left:50%;bottom:10px;transform:translateX(-50%);
        padding:5px 10px;border-radius:999px;
        background: rgba(0,0,0,.62);
        border:1px solid rgba(255,255,255,.14);
        color:#fff;font-size:12px;font-weight:800;backdrop-filter:blur(6px);
        z-index:4;white-space:nowrap;
      }

      .ipbadge{
        position:absolute;top:0;left:0;right:0;height:28px;
        display:flex;align-items:center;justify-content:center;
        background:#ff8a00;color:#fff;
        font-weight:900;font-size:11px;
        letter-spacing:.7px;text-transform:uppercase;
        z-index:5;
      }

      .ipbody{padding:10px 12px 9px;min-height:74px}
      .iptitle{
        margin:0 0 6px 0;font-size:12.5px;font-weight:800;line-height:1.25;
        display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
      }
      .ipsub{margin:0 0 10px 0;opacity:.75;font-size:11px;font-weight:700}
      .ipmeta{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px}
      .ipdel{color:#79c6ff;font-weight:800}

      .ipfoot{margin-top:auto;padding:9px 12px 10px;border-top:1px solid rgba(255,255,255,.07);min-height:47px;display:flex;align-items:center}
      .ipstore{display:flex;align-items:center;gap:8px;min-width:0}
      .ipav{
        width:28px;height:28px;border-radius:999px;overflow:hidden;
        display:flex;align-items:center;justify-content:center;
        background:rgba(255,255,255,.08);
        border:1px solid rgba(255,255,255,.12);
        flex:0 0 auto
      }
      .ipav img{width:100%;height:100%;object-fit:cover}
      .ipname{font-weight:500;font-size:13px;letter-spacing:.15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

      .ipcard:hover{
        transform:translateY(-5px) scale(1.015);
        box-shadow:0 12px 30px rgba(0,0,0,.40);
        cursor:pointer;border-color:rgba(0,144,255,.45);
      }
      .ipcard:hover .ipprice{transform:translateX(-50%) scale(1.05)}

      @media(max-width:768px){
        .ipgrid{gap:12px}
        .ipbody{padding:9px 10px 8px;min-height:68px}
        .iptitle{font-size:12px;margin-bottom:4px}
        .ipsub{margin:0 0 8px 0;font-size:10.5px}
        .ipmeta{font-size:11px}
        .ipfoot{padding:8px 10px 9px;min-height:43px}
        .ipav{width:24px;height:24px}
        .ipname{font-size:12px}
      }
      @media(max-width:640px){
        .ipbadge{height:24px;font-size:10px;letter-spacing:.45px}
        .ipprice{left:8px;bottom:8px;transform:none;padding:4px 7px;font-size:10px}
        .ipcard:hover .ipprice{transform:none}
        .iptitle{font-size:11.5px;-webkit-line-clamp:1}
      }

      /* States */
      .ip-state{padding:60px 20px;text-align:center;opacity:.85;font-size:15px}
      .ip-state .ic{font-size:40px;display:block;margin-bottom:12px;opacity:.7}
      .ip-retry{margin-top:14px;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:9px 18px;font-weight:700;cursor:pointer}

      .ip-skel{background:rgba(255,255,255,.06);border:1px solid var(--border-color);border-radius:16px;height:240px;overflow:hidden;position:relative}
      .ip-skel::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transform:translateX(-100%);animation:ipShimmer 1.2s infinite}
      @keyframes ipShimmer{100%{transform:translateX(100%)}}
    </style>
</head>
<body>
    <header class="ip-header">
      <div class="ip-header-inner">
        <a href="/" class="ip-logo" aria-label="Ana Sayfa">
          <img src="assets/uploads/servers/logod1ef6502-ec0d-.png" alt="Epin Hesabım" onerror="this.style.display='none'">
        </a>
        <div class="ip-search">
          <i class="fas fa-search"></i>
          <input type="text" id="ipSearch" placeholder="İlan ara... (oyun, ürün, satıcı)">
        </div>
        <a href="/" class="ip-home-btn"><i class="fas fa-home"></i>&nbsp;Ana Sayfa</a>
      </div>
    </header>

    <main class="ip-wrap">
      <div class="ip-title-block">
        <h1><i class="fas fa-store"></i> İlan Pazarı <span class="ip-count" id="ipCount"></span></h1>
        <p>Sisteme yüklenmiş tüm aktif ilanlar tek listede — canlı olarak güncellenir.</p>
      </div>

      <div class="ipgrid" id="ipGrid">
        <div class="ip-skel"></div><div class="ip-skel"></div><div class="ip-skel"></div>
        <div class="ip-skel"></div><div class="ip-skel"></div><div class="ip-skel"></div>
      </div>
    </main>

    <script>
    (function(){
      'use strict';
      var grid = document.getElementById('ipGrid');
      var countEl = document.getElementById('ipCount');
      var searchEl = document.getElementById('ipSearch');
      var allProducts = [];

      // Türkçe karakterleri normalize eden SEO slug üretici (backend ile uyumlu)
      function slugify(str){
        var trMap = {'ç':'c','ğ':'g','ı':'i','ö':'o','ş':'s','ü':'u','Ç':'c','Ğ':'g','İ':'i','Ö':'o','Ş':'s','Ü':'u'};
        return (str || '')
          .replace(/[çğıöşüÇĞİÖŞÜ]/g, function(c){ return trMap[c] || c; })
          .toLowerCase().trim()
          .replace(/\s+/g, '-')
          .replace(/[^a-z0-9-]/g, '')
          .replace(/-+/g, '-')
          .replace(/^-|-$/g, '') || 'ilan';
      }

      function esc(s){
        return String(s == null ? '' : s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }

      function priceText(p){
        var n = Number(p);
        if (!isFinite(n)) n = 0;
        return n.toLocaleString('tr-TR', { minimumFractionDigits: 2 }) + ' TL';
      }

      function cardHtml(p){
        var id = p.id || p._id || '';
        var href = '/ilan-pazari/' + slugify(p.title) + '-' + id;
        var img = p.image || 'assets/img/placeholder.jpg';
        return '' +
          '<a class="ipcard" href="' + href + '">' +
            '<div class="ipthumb">' +
              '<img src="' + esc(img) + '" alt="' + esc(p.title) + '" loading="lazy" onerror="this.src=\'assets/img/placeholder.jpg\'">' +
              '<div class="ipprice">' + priceText(p.price) + '</div>' +
            '</div>' +
            '<div class="ipbody">' +
              '<p class="iptitle">' + esc(p.title) + '</p>' +
              '<p class="ipsub">' + esc(p.categoryName || p.category || 'Genel') + '</p>' +
              '<div class="ipmeta"><div class="ipdel">⚡ Manuel Teslimat</div><div></div></div>' +
            '</div>' +
            '<div class="ipfoot">' +
              '<div class="ipstore">' +
                '<span class="ipav"><img src="assets/img/avatar-1.png" alt="Satıcı"></span>' +
                '<span class="ipname">' + esc(p.sellerName || 'Anonim') + '</span>' +
              '</div>' +
            '</div>' +
          '</a>';
      }

      function render(list){
        if (!list || list.length === 0){
          grid.innerHTML = '<div class="ip-state" style="grid-column:1/-1"><span class="ic">📭</span>Aramanızla eşleşen aktif ilan bulunamadı.</div>';
          countEl.textContent = '';
          return;
        }
        grid.innerHTML = list.map(cardHtml).join('');
        countEl.textContent = '(' + list.length + ' ilan)';
      }

      function applyFilter(){
        var q = (searchEl.value || '').toLowerCase().trim();
        if (!q){ render(allProducts); return; }
        var filtered = allProducts.filter(function(p){
          var text = ((p.title||'') + ' ' + (p.categoryName||p.category||'') + ' ' + (p.sellerName||'')).toLowerCase();
          return text.indexOf(q) !== -1;
        });
        render(filtered);
      }

      function load(isRefresh){
        fetch('/api/products', { cache: 'no-store' })
          .then(function(r){ return r.json(); })
          .then(function(products){
            if (!Array.isArray(products)){
              if (!isRefresh) grid.innerHTML = '<div class="ip-state" style="grid-column:1/-1">İlanlar yüklenemedi.</div>';
              return;
            }
            allProducts = products;
            applyFilter();
          })
          .catch(function(err){
            console.error('İlan Pazarı yüklenemedi:', err);
            if (!isRefresh) grid.innerHTML = '<div class="ip-state" style="grid-column:1/-1"><span class="ic">⚠️</span>İlanlar yüklenemedi, lütfen bağlantınızı kontrol edin.<br><button class="ip-retry" onclick="window.location.reload()">Tekrar Dene</button></div>';
          });
      }

      searchEl.addEventListener('input', applyFilter);

      load(false);
      // Yeni ilanlar otomatik görünsün (canlı güncelleme)
      setInterval(function(){ load(true); }, 20000);
    })();
    </script>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" crossorigin="anonymous"></script>
    <script src="assets/socket-client.js?v=1"></script>
</body>
</html>
