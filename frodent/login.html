      url('/assets/img/visuals/login_form_68c980a7d591a_1758036135.jpg') center/cover no-repeat fixed;

    .page::after { content:""; position:absolute; inset:0; z-index:0; background:
      linear-gradient(180deg, rgba(20,22,36,.55) 0%, rgba(20,22,36,.75) 45%, rgba(20,22,36,.95) 100%);
      clip-path: polygon(0 0, 100% 0, 100% 38%, 50% 58%, 0 38%); }
    .card { position: relative; z-index: 1; width: 100%; max-width: 420px; background: rgba(18,16,31,0.95); border-radius: 18px; box-shadow: 0 25px 60px rgba(5,5,20,0.65); padding: 32px 34px 28px; border: 1px solid rgba(255,255,255,0.06); }
    .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom: 24px; }
    .title { font-size: 24px; font-weight: 800; color:#f8fafc; margin: 0; }
    .modal-close { width:36px; height:36px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color:#a5b4fc; display:flex; align-items:center; justify-content:center; cursor:pointer; transition: all 0.2s ease; }
    .modal-close:hover { border-color: rgba(255,255,255,0.4); color:#fff; background: rgba(255,255,255,0.08); }
    form { display:grid; gap:12px; }
    label { font-size: 13px; color: var(--text-muted); }
    .input { display:flex; align-items:center; height: 54px !important; gap:10px; border:1px solid rgba(226,232,240,0.25); background: rgba(14,15,30,0.9); border-radius:12px; padding:0 14px; }
    .input i { color:#94a3b8; }
    .input input { flex:1; background:transparent; border:0; outline:0; color:#f8fafc; font-size:14px; }
    .input.with-action { padding-right: 44px; position: relative; }
    .action { position:absolute; right:8px; top:50%; transform: translateY(-50%); width:32px; height:32px; display:grid; place-items:center; border:1px solid var(--border-color); border-radius:8px; background:#1a1625; color:var(--text-color); cursor:pointer; }
    .btn { width:100%; height:48px; border-radius:14px; border:0; background: linear-gradient(135deg, #a855f7, #7c3aed); color:white; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-size:15px; }
    button, .btn { font-family: inherit; }
    .providers { display:flex; gap:12px; margin-top: 6px; }
    .provider { flex:1; height:44px; border-radius:10px; border:0; color:#fff; font-weight:700; display:flex; align-items:center; justify-content:center; gap:8px; cursor:not-allowed; opacity:.9; }
    .provider.g { background: var(--google); }
    .provider.f { background: var(--facebook); }
    .provider.t { background: var(--twitch); }
    .muted { margin-top: 8px; text-align:center; font-size:13px; color: var(--text-muted); }
    .muted a { color:#a78bfa; text-decoration:none; }
    .cta { margin-top: 12px; width:100%; height:48px; border:0; border-radius:12px; background:#10b981; color:#ffffff; font-weight:800; box-shadow: 0 12px 30px rgba(16,185,129,.25); cursor:pointer; }
    /* Steps */
    .steps-wrap { width:100%; max-width: 1100px; position: relative; z-index:1; margin: 40px auto 16px auto; padding: 0 14px; }
    .steps-header { text-align:center; margin-bottom: 12px; }
    .steps-subtitle { color: #c7d2fe; font-size: 13px; opacity:.9; margin:0; }
    .steps-title { color:#a5b4fc; font-size: 20px; font-weight: 800; margin:6px 0 12px 0; }
    .steps { display:grid; grid-template-columns: repeat(3, minmax(200px, 1fr)); gap:48px; justify-items:center; }
    .step { width:100%; max-width: 260px; height: 160px; background:#0f1118; border:1px solid var(--border-color); border-radius:12px; padding:16px 12px; text-align:center; transition:.2s; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:10px; }
    .step-icon { width:48px; height:48px; border-radius: 50%; background: rgba(34,197,94,0.18); border: 1px solid rgba(34,197,94,0.35); display:flex; align-items:center; justify-content:center; }
    .step-icon i { font-size:20px; color:#22c55e; }
    .step-head { display:flex; flex-direction:column; gap:2px; margin-top: 4px; }
    .step-title-top { color:#c7ccda; font-weight:800; font-size:14px; }
    .step-title-sub { color:#9ca3af; font-size:12px; }
    .step-divider { width:28px; height:2px; background: rgba(255,255,255,0.12); margin: 6px auto; }
    .step-desc { color:#b0b7c6; font-size:12px; line-height:1.2; }
    .step:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,.28); }
    @media (max-width: 900px) { .auth-block { margin-top: 60px; gap: 10px; } .steps { gap:28px; } }
    @media (max-width: 700px) { .steps { grid-template-columns: 1fr; gap:28px; } }
    @media (max-width: 600px){
      html, body { overflow-x:hidden; }
      .page { padding:16px 34px; max-width:100vw; }

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
(function(){
      const btn = document.querySelector('.action[data-toggle]');
      if (btn) btn.addEventListener('click', function(){
    const input = document.getElementById(this.getAttribute('data-toggle'));
    if (!input) return; const icon = this.querySelector('i');
        if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye-slash','fa-eye'); }
        else { input.type = 'password'; icon.classList.replace('fa-eye','fa-eye-slash'); }
      });
})();
</script>
<script>

document.addEventListener('DOMContentLoaded', function(){
  const form = document.getElementById('loginForm');
  const submitBtn = document.querySelector('.btn[type="submit"]');

  if(!form){
    console.error('loginForm not found');
    return;
  }

  // Fallback: ensure clicking the visible button submits the form
  if(submitBtn){
    submitBtn.addEventListener('click', function(){
      if(typeof form.requestSubmit === 'function') form.requestSubmit();
      else form.dispatchEvent(new Event('submit', {cancelable:true}));
    });
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    console.log('loginForm submit fired');

    const identifier = document.getElementById('identifier').value;
    const password = document.getElementById('password').value;

    if(!identifier || !password){
      Swal.fire({ icon:'warning', title:'Eksik Bilgi', text:'Lütfen tüm alanları doldurun.', confirmButtonColor:'#f59e0b', background:'#14172a', color:'#ffffff' });
      return;
    }

    try{
      const response = await fetch('/api/auth/login', {
        method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify({ identifier, password })
      });

      const result = await response.json();

      if(response.ok){
        localStorage.setItem('token', result.token);
        localStorage.setItem('user', JSON.stringify(result.user));
        Swal.fire({ icon:'success', title:'Başarılı', text:'Giriş başarılı.', confirmButtonColor:'#2563eb', background:'#14172a', color:'#ffffff' }).then(()=>{ window.location.href='/'; });
      }else{
        Swal.fire({ icon:'error', title:'Giriş Başarısız', text: result.error || 'Kullanıcı adı/e-posta veya parola hatalı.', confirmButtonColor:'#7c3aed', background:'#14172a', color:'#ffffff' });
      }

    }catch(err){
      console.error('login error', err);
      Swal.fire({ icon:'error', title:'Sunucu Hatası', text:'Backend bağlantısı başarısız.', confirmButtonColor:'#ef4444', background:'#14172a', color:'#ffffff' });
    }
  });
});

</script>
